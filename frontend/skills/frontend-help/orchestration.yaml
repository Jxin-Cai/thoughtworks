# 前端编排定义
name: frontend-orchestration
version: 1
description: 前端端到端编排步骤

variables:
  IDEA_DIR: ".thoughtworks/{idea-name}"
  FRONTEND_HELP: "../frontend-help"

steps:
  - id: receive-idea
    description: 接收 idea-name
    action:
      type: self
      instructions: |
        解析 $ARGUMENTS 确定 idea-name。
        检查 .thoughtworks/<idea-name>/ 目录是否存在。
        检查项目中已有 OHS 层代码（Controller/Router/Handler）。
        mkdir -p .thoughtworks/<idea-name>/frontend-designs

  - id: clarify
    description: 前端需求澄清
    gate:
      check: frontend-requirement-exists
      on-pass: skip
      on-fail: execute
    action:
      type: skill
      name: clarify
      args: "frontend {idea-name}"
    postcondition:
      check: frontend-requirement-exists

  - id: branch
    description: 创建功能分支
    action:
      type: skill
      name: branch
      args: "{idea-name}"
    postcondition:
      check: branch-ready

  - id: assessment
    description: 前端评估（Decision-Maker 亲自执行）
    gate:
      check: frontend-assessment-exists
      on-pass: skip
      on-fail: execute
    action:
      type: self
      read-first:
        - "{FRONTEND_HELP}/workflow.yaml"
      instructions: |
        1. 扫描项目中已有的 OHS 层代码（Controller/Router/Handler），提取 API 端点列表，评估前端工作
        2. 写入 {IDEA_DIR}/frontend-assessment.md
        3. 从 workflow.yaml 解析所有前端层 id，初始化状态:
           node {FRONTEND_HELP}/scripts/frontend-workflow-status.mjs {IDEA_DIR} --init {idea-name} <所有层 id>
    postcondition:
      check: frontend-assessment-exists

  - id: design
    description: 前端设计编排
    action:
      type: skill
      name: frontend-thought
      args: "{idea-name}"

  - id: confirm-layers
    description: 标记各层为 confirmed（thought skill 内部已完成用户确认）
    action:
      type: script
      command: "node {FRONTEND_HELP}/scripts/frontend-workflow-status.mjs {IDEA_DIR} --set {layer-id} confirmed"
    for-each: "workflow.yaml 中所有前端层 id"
    postcondition:
      action:
        type: script
        command: "touch {IDEA_DIR}/.frontend-approved"

  - id: code
    description: 前端编码编排
    action:
      type: skill
      name: frontend-works
      args: "{idea-name}"

  - id: supplementary
    description: 审查需求遗漏并执行工程支撑任务
    action:
      type: self
      instructions: |
        1. Read {IDEA_DIR}/frontend-requirement.md，逐条审查需求项
        2. 对比已完成的前端代码，识别出不属于前端三层但在需求中提到的事项
           （如 Dockerfile、nginx 配置、环境变量配置、构建脚本等）
        3. 如果有遗漏：
           - 生成 {IDEA_DIR}/supplementary-tasks.md（如已存在则追加），每个遗漏需求一项，checklist 格式
           - 向用户展示遗漏清单，确认后逐项用 Agent（subagent_type: general-purpose, max_turns: 10）执行
        4. 如果无遗漏：告知用户所有需求项均已覆盖
        5. 审查完成（无论是否有遗漏）：touch {IDEA_DIR}/.frontend-supplementary-reviewed
    postcondition:
      check: frontend-supplementary-reviewed

  - id: summary
    description: 完成汇总
    action:
      type: self
      instructions: "向用户展示实现摘要、各层完成状态、产出文件总列表"

  - id: merge
    description: 合并分支
    action:
      type: skill
      name: merge
      args: "{idea-name}"

# resume-table 已由 core/scripts/orchestration-status.mjs 程序化实现
# 以下表格仅作为逻辑文档保留
resume-table:
  - condition: "frontend-requirement.md 不存在"
    resume-from: clarify
  - condition: "frontend-assessment.md 不存在"
    resume-from: assessment
  - condition: "frontend-designs/ 为空"
    resume-from: design
  - condition: "无 .frontend-approved"
    resume-from: confirm-layers
  - condition: ".frontend-approved 存在，编码未完成"
    resume-from: code
  - condition: "编码完成, .frontend-supplementary-reviewed 不存在"
    resume-from: supplementary
  - condition: ".frontend-supplementary-reviewed 存在"
    resume-from: merge
