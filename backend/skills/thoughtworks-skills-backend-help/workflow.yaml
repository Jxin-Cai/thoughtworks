# DDD 工作流定义
# thoughtworks-backend-thought / thoughtworks-backend-works 读取此文件决定执行顺序

name: ddd-layered
version: 2
description: DDD 四层架构工作流

layers:
  - id: domain
    phase: 1
    design-template: ../thoughtworks-skills-backend-thought/assets/domain-design.md
    thinker-ref: ../../agents/thoughtworks-agent-ddd-domain-thinker.md
    worker-ref: ../../agents/thoughtworks-agent-ddd-worker-domain.md
    requires: []
    verify:
      - pattern: "**/domain/**/model/*.java"
        description: 验证领域模型类已创建
      - pattern: "**/domain/**/repository/*.java"
        description: 验证仓储接口已创建

  - id: infr
    phase: 2
    design-template: ../thoughtworks-skills-backend-thought/assets/infr-design.md
    thinker-ref: ../../agents/thoughtworks-agent-ddd-infr-thinker.md
    worker-ref: ../../agents/thoughtworks-agent-ddd-worker-infr.md
    requires: [domain]
    verify:
      - pattern: "**/infr/repository/**/*RepositoryImpl.java"
        description: 验证仓储实现已创建
      - pattern: "**/infr/repository/**/*Mapper.java"
        description: 验证 Mapper 已创建
      - pattern: "**/infr/repository/**/*PO.java"
        description: 验证 PO 已创建

  - id: application
    phase: 2
    design-template: ../thoughtworks-skills-backend-thought/assets/application-design.md
    thinker-ref: ../../agents/thoughtworks-agent-ddd-application-thinker.md
    worker-ref: ../../agents/thoughtworks-agent-ddd-worker-application.md
    requires: [domain]
    verify:
      - pattern: "**/application/**/*ApplicationService.java"
        description: 验证应用服务已创建
      - pattern: "**/application/**/*Command.java"
        description: 验证 Command 已创建

  - id: ohs
    phase: 3
    design-template: ../thoughtworks-skills-backend-thought/assets/ohs-design.md
    thinker-ref: ../../agents/thoughtworks-agent-ddd-ohs-thinker.md
    worker-ref: ../../agents/thoughtworks-agent-ddd-worker-ohs.md
    requires: [application, domain]
    verify:
      - pattern: "**/ohs/**/*Controller.java"
        description: 验证 Controller 已创建
      - pattern: "**/ohs/**/*Request.java"
        description: 验证 Request DTO 已创建
